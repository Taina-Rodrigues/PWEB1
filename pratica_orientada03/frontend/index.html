<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pastelaria do Zé</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🍴 Sistema de Pedidos</h1>

  <div class="form">
    <label>Cliente</label>
    <input type="text" id="cliente" placeholder="Nome do cliente">
    <label>Telefone do cliente</label>
    <input type="text" id="telefone-cliente" placeholder="5511999999999">

    <label>Produto</label>
    <select id="produto">
      <option value="pastel" data-preco="8.5">Pastel - R$ 8,50</option>
      <option value="caldo" data-preco="6.0">Caldo - R$ 6,00</option>
      <option value="refrigerante" data-preco="5.0">Refrigerante - R$ 5,00</option>
      <option value="suco" data-preco="7.5">Suco - R$ 7,50</option>
    </select>

    <label>Quantidade</label>
    <input type="number" id="qtd" placeholder="Quantidade" min="1" value="1">

    <label>Desconto</label>
    <select id="desconto">
      <option value="nenhum">Sem desconto</option>
      <option value="promocional">10% acima de R$ 50,00</option>
    </select>

    <button id="adicionar">Adicionar</button>
    <button id="finalizar">Finalizar Pedido</button>
  </div>

  <div class="lista">
    <h2>Itens</h2>
    <ul id="lista"></ul>
  </div>

  <div class="total">
    <h2>Total: R$ <span id="total">0.00</span></h2>
  </div>

  <div id="whatsappLinks" class="links"></div>
</div>

<script src="script.js"></script>

</body>
</html>
